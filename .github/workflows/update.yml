name: Update HR Data

on:
  schedule:
    - cron: '0 10 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Run model
        run: python main.py

      - name: Commit new data
  run: |
    git config --global user.name "hr-machine-bot"
    git config --global user.email "hr-machine-bot@users.noreply.github.com"

    git pull --rebase

    git add latest_picks.csv
    git commit -m "Auto update HR picks" || echo "No changes to commit"

    git push
